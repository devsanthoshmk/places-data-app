# GlobexData Release Workflow
# ===========================
# Builds Android APK and creates a GitHub Release when you push a tag.
#
# HOW TO USE:
#   1. Update version in package.json and android/app/build.gradle
#   2. Commit your changes
#   3. Create and push a tag:
#        git tag v1.0.0
#        git push origin v1.0.0
#   4. The workflow runs automatically and creates a GitHub Release with the APK
#
# TAG FORMAT: Must start with 'v' (e.g., v1.0.0, v1.2.3-beta)

name: Release

on:
  push:
    tags:
      - 'v*'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build Android APK
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    outputs:
      apk_path: ${{ steps.find_apk.outputs.apk_path }}
      apk_name: ${{ steps.find_apk.outputs.apk_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          echo "::group::npm install"
          npm ci
          echo "::endgroup::"
          echo "✅ Dependencies installed"

      - name: Build web assets
        run: |
          echo "::group::vite build"
          npx vite build
          echo "::endgroup::"
          echo "✅ Web build complete"
          echo "::group::dist contents"
          ls -lh dist/
          echo "::endgroup::"

      - name: Sync Capacitor to Android
        run: |
          echo "::group::cap sync"
          npx cap sync android
          echo "::endgroup::"
          echo "✅ Capacitor sync complete"

      - name: Build release APK
        working-directory: android
        run: |
          echo "::group::gradle assembleRelease"
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1
          echo "::endgroup::"
          echo "✅ APK build complete"

      - name: Locate APK
        id: find_apk
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name '*.apk' | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ ERROR: No APK found in android/app/build/outputs/apk/release/"
            find android/app/build/outputs/ -name '*.apk' 2>/dev/null || echo "No APK files found anywhere"
            exit 1
          fi
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "✅ APK found: $APK_PATH ($APK_SIZE)"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "apk_name=GlobexData-$(echo ${{ github.ref_name || inputs.tag_name }}).apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 5

  # ─────────────────────────────────────────────
  # Job 2: Create GitHub Release
  # ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android

      - name: Determine tag name
        id: tag
        run: |
          TAG="${{ github.ref_name }}"
          if [ -z "$TAG" ] || [ "$TAG" = "" ]; then
            TAG="${{ inputs.tag_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "📌 Release tag: $TAG"

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          APK=$(find artifacts/android -name '*.apk' | head -1)
          cp "$APK" "release-assets/GlobexData-${{ steps.tag.outputs.tag }}.apk"
          echo "📦 Release assets:"
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "GlobexData ${{ steps.tag.outputs.tag }}"
          body: |
            ## GlobexData ${{ steps.tag.outputs.tag }}

            ### Downloads
            - **Android APK** — Install directly on your Android device

            ### What's included
            - Google Places data scraper
            - Excel export (.xlsx)
            - Background search with notifications
            - Filter, sort, and detail view for results

            ---
            Built from commit: ${{ github.sha }}
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.tag, 'beta') || contains(steps.tag.outputs.tag, 'alpha') || contains(steps.tag.outputs.tag, 'rc') }}
          generate_release_notes: true
